name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
        shell: pwsh

      - name: Build Windows portable executable
        run: |
          $env:PATH = "$env:USERPROFILE\go\bin;$env:PATH"
          wails generate module
          wails build -clean -platform windows/amd64
        shell: pwsh

      - name: Generate SHA256
        run: |
          $hash = (Get-FileHash build/bin/LockLift.exe -Algorithm SHA256).Hash
          Set-Content -Path build/bin/LockLift.exe.sha256 -Value $hash -NoNewline
        shell: pwsh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/LockLift.exe
            build/bin/LockLift.exe.sha256
          generate_release_notes: true
